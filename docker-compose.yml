# One-shot local stack: FastAPI backend + React (primary) workflow UI.
# The legacy Streamlit UI is kept as an optional secondary service.
# No external services required (MockLLM + SQLite).
services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir backend
    environment:
      - MIZAN_DATABASE_URL=sqlite:////data/mizan.db
      - MIZAN_LLM_PROVIDER=mock
    ports:
      - "8000:8000"
    volumes:
      - mizan-data:/data

  # Primary UI — React + Vite, served by nginx, proxies /api -> backend.
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Legacy UI — original Streamlit MVP, still runs against the same API.
  frontend:
    build: .
    command: streamlit run streamlit_app/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      - MIZAN_API_BASE_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mizan-data:
