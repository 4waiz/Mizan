services:
  - type: web
    name: mizan-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # SQLite lives on the persistent disk so seeded demo data survives restarts.
      - key: MIZAN_DATABASE_URL
        value: sqlite:////var/data/mizan.db
      # Flip to "anthropic" and add ANTHROPIC_API_KEY in the Render dashboard
      # to use the real model instead of the deterministic mock.
      - key: MIZAN_LLM_PROVIDER
        value: mock
    disk:
      name: mizan-data
      mountPath: /var/data
      sizeGB: 1
